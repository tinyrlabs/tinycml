; PlatformIO project for tinycml-embed
; Board: ESP32 (Adafruit Feather ESP32)
; Framework: Arduino
; ML: KNN comfort predictor with static memory pool
[env:featheresp32]
platform = espressif32
board = featheresp32
framework = arduino
board_build.flash_mode = dio
build_flags =
    -DCML_ENABLE_KNN
    -DCML_USE_POOL
    -DCML_POOL_SIZE=2048
    -Ilib/tinycml
